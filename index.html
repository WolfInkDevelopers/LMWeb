<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiet AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        
        /* Markdown minimalista */
        .markdown-body p { margin-bottom: 0.75em; leading-trim: both; text-edge: cap; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body pre { background: #09090b; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 0.75em; border: 1px solid #27272a; }
        .markdown-body code { font-family: monospace; color: #e4e4e7; font-size: 0.875em; background: #18181b; padding: 0.2em 0.4em; border-radius: 0.25rem; }
        .markdown-body pre code { background: transparent; padding: 0; color: #a1a1aa; }
        
        /* Animación de carga */
        @keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .is-generating { animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-black text-zinc-300 h-screen w-screen flex overflow-hidden">

    <!-- Sidebar Izquierdo -->
    <aside class="w-full md:w-72 bg-zinc-950 border-r border-zinc-900 flex flex-col flex-shrink-0 transition-all absolute md:relative z-20 h-full" id="sidebar">
        
        <!-- Header Sidebar -->
        <div class="p-5 border-b border-zinc-900 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-zinc-700 shadow-[0_0_10px_rgba(255,255,255,0.1)] transition-colors duration-500" id="status-indicator"></div>
                <h1 class="text-sm font-semibold text-zinc-100 tracking-wide">Quiet AI</h1>
            </div>
            <span id="ram-badge" class="hidden text-[10px] bg-zinc-900 text-zinc-400 px-2 py-1 rounded-md border border-zinc-800">4GB Fix</span>
        </div>

        <!-- Controles Sidebar -->
        <div class="p-5 flex flex-col gap-5 flex-1 overflow-y-auto overflow-x-hidden">
            
            <!-- Selector Customizado -->
            <div class="flex flex-col gap-2 relative" id="model-search-container">
                <label class="text-[11px] font-medium uppercase tracking-wider text-zinc-500">Modelo Local</label>
                
                <div class="relative">
                    <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="model-select" autocomplete="off" placeholder="Buscar modelo (Ej: Llama 3.2)..." class="w-full bg-black border border-zinc-800 text-zinc-100 text-sm rounded-md focus:ring-1 focus:ring-zinc-500 focus:border-zinc-500 block pl-9 pr-3 py-2.5 outline-none transition-all placeholder:text-zinc-600">
                    
                    <!-- Dropdown de resultados (Oculto por defecto) -->
                    <div id="custom-dropdown" class="absolute left-0 right-0 top-full mt-1 bg-zinc-950/95 backdrop-blur-xl border border-zinc-800 rounded-md shadow-2xl max-h-64 overflow-y-auto z-50 hidden flex-col divide-y divide-zinc-800/50">
                        <!-- Los resultados se inyectan mediante JS -->
                    </div>
                </div>
                <span id="model-count" class="text-[10px] text-zinc-600">Conectando catálogo...</span>
            </div>

            <!-- Botón Cargar -->
            <button id="load-btn" class="w-full bg-zinc-100 hover:bg-white text-black font-medium rounded-md text-sm px-4 py-2.5 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2">
                Cargar Motor Local
            </button>

            <!-- Progreso Minimalista -->
            <div id="progress-container" class="hidden flex-col gap-2">
                <div class="flex justify-between text-[10px] text-zinc-500 font-mono">
                    <span id="progress-text">Iniciando...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="w-full bg-zinc-900 rounded-full h-0.5">
                    <div id="progress-bar" class="bg-zinc-100 h-0.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <!-- Ajustes Avanzados -->
            <details class="group border border-zinc-900 rounded-md bg-black/50 overflow-hidden mt-2">
                <summary class="text-xs font-medium text-zinc-400 cursor-pointer p-3 hover:text-zinc-200 transition-colors select-none">
                    Configuración Avanzada
                </summary>
                <div class="p-3 pt-0 flex flex-col gap-4 border-t border-zinc-900/50 mt-2">
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <label class="text-[11px] text-zinc-500">Temperatura</label>
                            <span id="temp-val" class="text-[11px] text-zinc-300 font-mono">0.7</span>
                        </div>
                        <input type="range" id="temp-slider" min="0.0" max="1.0" step="0.1" value="0.7" class="w-full h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-zinc-300">
                    </div>
                    <label class="flex items-center gap-2 cursor-pointer mt-1">
                        <input type="checkbox" id="speculative-chk" class="w-3.5 h-3.5 accent-zinc-300 bg-black border-zinc-800 rounded">
                        <span class="text-[11px] text-zinc-400">Aceleración Especulativa</span>
                    </label>
                </div>
            </details>
        </div>

        <div class="p-5 border-t border-zinc-900 hidden" id="bottom-actions">
            <button id="new-chat-btn" class="w-full text-zinc-400 hover:text-zinc-100 bg-transparent hover:bg-zinc-900 border border-zinc-800 font-medium rounded-md text-xs px-4 py-2.5 transition-colors">
                Limpiar Conversación
            </button>
        </div>
    </aside>

    <!-- Área Principal de Chat -->
    <main class="flex-1 flex flex-col relative h-full bg-black" id="main-area">
        
        <!-- Estado Vacío (Empty State) -->
        <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none transition-opacity duration-500">
            <svg class="w-10 h-10 text-zinc-800 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5"></path></svg>
            <h2 class="text-zinc-500 text-sm font-medium">Ningún modelo cargado</h2>
            <p class="text-zinc-700 text-xs mt-1">Selecciona uno en el panel izquierdo.</p>
        </div>

        <!-- Contenedor de Mensajes -->
        <div id="chat-box" class="flex-1 overflow-y-auto px-4 md:px-12 pt-8 pb-32 flex flex-col gap-8 scroll-smooth z-10"></div>

        <!-- Input Form Flotante -->
        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black via-black to-transparent pt-10 pb-6 px-4 md:px-12 z-20">
            <div class="max-w-3xl mx-auto relative">
                <form id="chat-form" class="relative flex items-end">
                    <textarea id="user-input" disabled rows="1" placeholder="Inicia un motor local para escribir..." class="w-full bg-zinc-900/80 backdrop-blur-md border border-zinc-800 text-zinc-100 text-sm rounded-xl focus:ring-1 focus:ring-zinc-600 focus:border-zinc-600 block pl-4 pr-12 py-3.5 outline-none transition-all disabled:opacity-50 disabled:cursor-not-allowed resize-none overflow-hidden max-h-32"></textarea>
                    
                    <button type="submit" id="send-btn" disabled class="absolute right-2 bottom-2 bg-zinc-100 hover:bg-white text-black rounded-lg p-2 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19V5m0 0l-7 7m7-7l7 7"></path></svg>
                    </button>
                </form>
                <div class="text-center mt-2">
                    <span class="text-[10px] text-zinc-600">Inferencia ejecutada 100% de forma local en tu dispositivo.</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Componente de Búsqueda UI Avanzado -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const input = document.getElementById('model-select');
            const dropdown = document.getElementById('custom-dropdown');
            const countSpan = document.getElementById('model-count');
            
            // Modelos recomendados manualmente por su calidad
            const curatedModels = [
                { id: "onnx-community/Llama-3.2-1B-Instruct", name: "Llama 3.2 (1B)", badge: "Recomendado" },
                { id: "onnx-community/Qwen2.5-0.5B-Instruct", name: "Qwen 2.5 (0.5B)", badge: "Rápido" },
                { id: "HuggingFaceTB/SmolLM2-360M-Instruct", name: "SmolLM2 (360M)", badge: "Equilibrado" },
                { id: "HuggingFaceTB/SmolLM2-1.7B-Instruct", name: "SmolLM2 (1.7B)", badge: "Razonamiento" },
                { id: "onnx-community/Phi-3.5-mini-instruct-onnx-web", name: "Phi 3.5 Mini", badge: "Premium" }
            ];
            
            let allModels = [...curatedModels];

            // Limpiador visual de nombres feos de repositorios
            function cleanModelName(id) {
                let name = id.split('/').pop();
                name = name.replace('-Instruct', '').replace('-ONNX', '').replace('-web', '').replace('-q4f16', '');
                return name.replace(/-/g, ' ');
            }

            // Renderizar la lista en el dropdown
            function renderDropdown(query = '') {
                dropdown.innerHTML = '';
                const lowerQuery = query.toLowerCase();
                
                const filtered = allModels.filter(m => 
                    m.id.toLowerCase().includes(lowerQuery) || 
                    m.name.toLowerCase().includes(lowerQuery)
                );

                if (filtered.length === 0) {
                    dropdown.innerHTML = `<div class="p-3 text-xs text-zinc-500 text-center">No se encontraron modelos.</div>`;
                    return;
                }

                filtered.forEach(m => {
                    const item = document.createElement('div');
                    item.className = 'flex flex-col p-3 hover:bg-zinc-800 cursor-pointer transition-colors';
                    
                    const badgeHtml = m.badge ? `<span class="text-[9px] px-1.5 py-0.5 rounded-sm border border-zinc-700 bg-zinc-900 text-zinc-300 ml-2">${m.badge}</span>` : '';
                    
                    item.innerHTML = `
                        <div class="flex items-center text-sm font-medium text-zinc-200">
                            ${m.name} ${badgeHtml}
                        </div>
                        <div class="text-[10px] text-zinc-500 mt-0.5 truncate">${m.id}</div>
                    `;
                    
                    item.addEventListener('click', () => {
                        input.value = m.id;
                        dropdown.classList.add('hidden');
                    });
                    
                    dropdown.appendChild(item);
                });
            }

            // Eventos del Input para mostrar/ocultar
            input.addEventListener('focus', () => {
                dropdown.classList.remove('hidden');
                renderDropdown(input.value);
            });
            
            input.addEventListener('input', (e) => {
                dropdown.classList.remove('hidden');
                renderDropdown(e.target.value);
            });

            // Cerrar si se hace click fuera del contenedor de búsqueda
            document.addEventListener('click', (e) => {
                const container = document.getElementById('model-search-container');
                if (!container.contains(e.target)) {
                    dropdown.classList.add('hidden');
                }
            });

            // Iniciar render básico
            renderDropdown();

            // Fetch en background al catálogo completo
            try {
                const res = await fetch('https://huggingface.co/api/models?author=onnx-community&sort=downloads&direction=-1&limit=250');
                const models = await res.json();
                
                let added = 0;
                models.forEach(m => {
                    if (m.id.toLowerCase().includes('instruct') || m.id.toLowerCase().includes('chat')) {
                        // Evitar duplicados
                        if (!allModels.find(existing => existing.id === m.id)) {
                            allModels.push({ id: m.id, name: cleanModelName(m.id) });
                            added++;
                        }
                    }
                });
                countSpan.textContent = `Catálogo en vivo: +${added} modelos detectados.`;
                if (!dropdown.classList.contains('hidden')) renderDropdown(input.value); // Re-renderizar si está abierto
            } catch (err) {
                countSpan.textContent = "Catálogo offline. Usando recomendaciones.";
            }
        });

        // Autoresize Textarea
        const textarea = document.getElementById('user-input');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = 'auto';
        });
        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('chat-form').dispatchEvent(new Event('submit'));
            }
        });
    </script>

    <!-- Motor de Inferencia WebGPU / WASM (Mantiene toda la lógica funcional robusta anterior) -->
    <script>
        const workerCode = `
            import { pipeline, env, TextStreamer } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.1/dist/transformers.min.js';
            
            env.allowLocalModels = false;
            env.backends.onnx.wasm.simd = true; 
            env.backends.onnx.wasm.numThreads = navigator.hardwareConcurrency || 4; 
            env.backends.onnx.wasm.proxy = false; 

            let generator = null;
            let draftGenerator = null;

            self.onmessage = async (event) => {
                const data = event.data;

                if (data.type === 'load') {
                    try {
                        if (generator) { await generator.dispose(); generator = null; }
                        if (draftGenerator) { await draftGenerator.dispose(); draftGenerator = null; }

                        const optimizedSessionOptions = {
                            graphOptimizationLevel: 'all',  
                            enableCpuMemArena: true,        
                            enableMemPattern: true,
                            logSeverityLevel: 4
                        };

                        const modelName = data.model;
                        const useSpeculative = data.speculative;

                        let draftModelName = null;
                        if (useSpeculative) {
                            const mLower = modelName.toLowerCase();
                            if (mLower.includes('smollm2-1.7b') || mLower.includes('smollm2-360m')) draftModelName = 'HuggingFaceTB/SmolLM2-135M-Instruct';
                            else if (mLower.includes('qwen2.5') && (mLower.includes('1.5b') || mLower.includes('3b'))) draftModelName = 'onnx-community/Qwen2.5-0.5B-Instruct';
                            else if (mLower.includes('llama-3.2') && mLower.includes('3b')) draftModelName = 'onnx-community/Llama-3.2-1B-Instruct';
                        }

                        const loadPipe = async (mName, isDraft) => {
                            const label = isDraft ? 'Borrador' : 'Principal';
                            try {
                                self.postMessage({ type: 'status', message: 'Iniciando WebGPU (q4f16) para ' + label });
                                return await pipeline('text-generation', mName, {
                                    device: 'webgpu', dtype: 'q4f16',
                                    progress_callback: (p) => self.postMessage({ type: 'progress', data: p }),
                                    session_options: optimizedSessionOptions
                                });
                            } catch (e1) {
                                try {
                                    self.postMessage({ type: 'status', message: 'Reintentando WebGPU (q4) para ' + label });
                                    return await pipeline('text-generation', mName, {
                                        device: 'webgpu', dtype: 'q4',
                                        progress_callback: (p) => self.postMessage({ type: 'progress', data: p }),
                                        session_options: optimizedSessionOptions
                                    });
                                } catch (e2) {
                                    self.postMessage({ type: 'status', message: 'Fallback a CPU Segura (q4) para ' + label, isCpu: true });
                                    return await pipeline('text-generation', mName, {
                                        device: 'wasm', dtype: 'q4', 
                                        progress_callback: (p) => self.postMessage({ type: 'progress', data: p }),
                                        session_options: optimizedSessionOptions
                                    });
                                }
                            }
                        };

                        generator = await loadPipe(modelName, false);
                        if (draftModelName) draftGenerator = await loadPipe(draftModelName, true);

                        self.postMessage({ type: 'ready' });

                    } catch (error) {
                        self.postMessage({ type: 'error', message: error.message });
                    }

                } else if (data.type === 'generate') {
                    try {
                        const prompt = generator.tokenizer.apply_chat_template(data.messages, {
                            tokenize: false, add_generation_prompt: true
                        });

                        const streamer = new TextStreamer(generator.tokenizer, {
                            skip_prompt: true, skip_special_tokens: true,
                            callback_function: (text) => self.postMessage({ type: 'update', text: text })
                        });

                        const useSampling = data.temperature > 0.0;
                        const generateArgs = {
                            max_new_tokens: 1024,
                            temperature: data.temperature,
                            top_p: useSampling ? 0.9 : undefined,
                            do_sample: useSampling,
                            streamer: streamer
                        };

                        if (data.speculative && !useSampling) {
                            if (draftGenerator) generateArgs.assistant_model = draftGenerator.model;
                            else generateArgs.prompt_lookup_num_tokens = 3;
                        }

                        await generator(prompt, generateArgs);
                        self.postMessage({ type: 'complete' });

                    } catch (error) {
                        self.postMessage({ type: 'error', message: error.message });
                    }
                }
            };
        `;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(blob);
        const worker = new Worker(workerUrl, { type: 'module' });

        const ui = {
            chatBox: document.getElementById('chat-box'),
            form: document.getElementById('chat-form'),
            input: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            loadBtn: document.getElementById('load-btn'),
            modelSelect: document.getElementById('model-select'),
            specChk: document.getElementById('speculative-chk'),
            tempSlider: document.getElementById('temp-slider'),
            tempVal: document.getElementById('temp-val'),
            progressContainer: document.getElementById('progress-container'),
            progressBar: document.getElementById('progress-bar'),
            progressText: document.getElementById('progress-text'),
            progressPercent: document.getElementById('progress-percent'),
            newChatBtn: document.getElementById('new-chat-btn'),
            emptyState: document.getElementById('empty-state'),
            statusInd: document.getElementById('status-indicator'),
            ramBadge: document.getElementById('ram-badge'),
            bottomActions: document.getElementById('bottom-actions')
        };

        let messages = []; 
        let isModelLoaded = false;
        let isGenerating = false;
        const downloadProgress = new Map();
        let currentBotMessageDiv = null;

        ui.tempSlider.addEventListener('input', (e) => ui.tempVal.textContent = parseFloat(e.target.value).toFixed(1));

        ui.loadBtn.addEventListener('click', () => {
            if (!ui.modelSelect.value.trim()) return;
            
            ui.loadBtn.disabled = true;
            ui.modelSelect.disabled = true;
            ui.loadBtn.textContent = `Asignando Memoria...`;
            ui.progressContainer.classList.remove('hidden');
            ui.statusInd.className = "w-3 h-3 rounded-full bg-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.3)] transition-colors duration-500";
            downloadProgress.clear();
            
            worker.postMessage({ type: 'load', model: ui.modelSelect.value.trim(), speculative: ui.specChk.checked });
        });

        ui.form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!isModelLoaded || isGenerating) return;

            const text = ui.input.value.trim();
            if (!text) return;

            appendMessage('user', text);
            ui.input.value = '';
            ui.input.style.height = 'auto';
            ui.input.disabled = true;
            ui.sendBtn.disabled = true;
            isGenerating = true;
            ui.statusInd.classList.add('is-generating');

            const botWrapper = appendMessage('bot-live', '');
            currentBotMessageDiv = botWrapper.querySelector('.markdown-body');

            let currentMarkdownText = "";
            messages.push({ role: 'user', content: text });
            
            const tempValue = parseFloat(ui.tempSlider.value);
            const isSpec = ui.specChk.checked;

            const localHandler = (e) => {
                const d = e.data;
                if (d.type === 'update') {
                    currentMarkdownText += d.text;
                    currentBotMessageDiv.innerHTML = marked.parse(currentMarkdownText);
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else if (d.type === 'complete') {
                    messages.push({ role: 'assistant', content: currentMarkdownText });
                    isGenerating = false;
                    ui.input.disabled = false;
                    ui.sendBtn.disabled = false;
                    ui.input.focus();
                    ui.statusInd.classList.remove('is-generating');
                    worker.removeEventListener('message', localHandler);
                } else if (d.type === 'error') {
                    currentBotMessageDiv.innerHTML = `<span class="text-red-400">Error: ${d.message}</span>`;
                    isGenerating = false;
                    ui.input.disabled = false;
                    ui.sendBtn.disabled = false;
                    ui.statusInd.classList.remove('is-generating');
                    worker.removeEventListener('message', localHandler);
                }
            };
            
            worker.addEventListener('message', localHandler);
            worker.postMessage({ type: 'generate', messages: messages, temperature: tempValue, speculative: isSpec });
        });

        ui.newChatBtn.addEventListener('click', () => {
            messages = [];
            ui.chatBox.innerHTML = '';
            ui.input.focus();
        });

        worker.addEventListener('message', (e) => {
            const data = e.data;

            if (data.type === 'status') {
                ui.progressText.textContent = data.message;
                if(data.isCpu) ui.ramBadge.classList.remove('hidden');
            }
            else if (data.type === 'progress') {
                const file = data.data;
                if (file.status === 'progress' || file.status === 'init') {
                    downloadProgress.set(file.file, file);
                    let loaded = 0, total = 0;
                    downloadProgress.forEach(p => { if (p.total) { loaded += p.loaded; total += p.total; } });
                    
                    if (total > 0) {
                        const percent = Math.min(100, Math.round((loaded / total) * 100));
                        ui.progressBar.style.width = percent + '%';
                        ui.progressPercent.textContent = percent + '%';
                    }
                } else if (file.status === 'ready') {
                    ui.progressText.textContent = `Compilando Caché...`;
                }
            }
            else if (data.type === 'ready') {
                isModelLoaded = true;
                ui.loadBtn.textContent = `Modelo en Línea`;
                ui.loadBtn.className = "w-full bg-zinc-900 text-zinc-500 font-medium rounded-md text-sm px-4 py-2.5 cursor-default border border-zinc-800";
                ui.progressContainer.classList.add('hidden');
                ui.input.disabled = false;
                ui.sendBtn.disabled = false;
                ui.input.placeholder = "Escribe un mensaje al motor local...";
                ui.emptyState.style.opacity = '0';
                ui.bottomActions.classList.remove('hidden');
                ui.statusInd.className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.3)] transition-colors duration-500";
                ui.input.focus();
            }
            else if (data.type === 'error' && !isGenerating) {
                ui.loadBtn.disabled = false;
                ui.modelSelect.disabled = false;
                ui.loadBtn.textContent = `Reintentar`;
                ui.progressContainer.classList.add('hidden');
                ui.statusInd.className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.3)] transition-colors duration-500";
                alert("Error: " + data.message);
            }
        });

        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `max-w-3xl w-full mx-auto flex gap-4 items-start`;
            
            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-md flex items-center justify-center flex-shrink-0 text-xs font-semibold select-none ${role === 'user' ? 'bg-zinc-800 text-zinc-300' : 'bg-zinc-100 text-black'}`;
            avatar.textContent = role === 'user' ? 'Tú' : 'AI';
            
            const contentBox = document.createElement('div');
            contentBox.className = `flex-1 min-w-0 pt-1`;
            
            const nameLabel = document.createElement('div');
            nameLabel.className = 'text-xs font-medium text-zinc-500 mb-1 select-none';
            nameLabel.textContent = role === 'user' ? 'Tú' : 'Local Motor';
            contentBox.appendChild(nameLabel);

            const bubble = document.createElement('div');
            bubble.className = `markdown-body text-sm text-zinc-300 leading-relaxed`;
            
            if (role === 'user') bubble.textContent = text; 
            else if (role === 'bot-live') bubble.innerHTML = `<span class="inline-block w-1.5 h-4 bg-zinc-500 animate-pulse"></span>`;

            contentBox.appendChild(bubble);
            wrapper.appendChild(avatar);
            wrapper.appendChild(contentBox);
            ui.chatBox.appendChild(wrapper);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

            return wrapper;
        }
    </script>
</body>
</html>
